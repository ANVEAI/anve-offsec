services:
  kali:
    build: .
    image: kali-ai:latest
    hostname: kali-ai
    container_name: kali-ai
    env_file: .env
    tty: true
    stdin_open: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./work:/work
      - ./tools:/tools:ro
      - ./config/tools.json:/config/tools.json:ro
      - ./config/authorized-targets.json:/config/authorized-targets.json
      # Docker socket for Docker-in-Docker ephemeral worker spawning
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount only the Hermes config files, not the whole directory, so the
      # installer-created agent code, skills, and data directories remain intact.
      - ./config/hermes/config.yaml:/home/pentest/.hermes/config.yaml:ro
      - ./config/hermes/SOUL.md:/home/pentest/.hermes/SOUL.md:ro
      # Mount your TryHackMe OpenVPN profile later, e.g.:
      # - ./vpn/thm.ovpn:/vpn/thm.ovpn:ro
    # OOB port range for reverse shells and OOB exfil detection (PentAGI-style)
    ports:
      - "28000-30000:28000-30000"

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest-browser
    container_name: openclaw
    hostname: openclaw
    env_file: .env
    environment:
      - OPENCLAW_SKIP_ONBOARDING=1
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - ./config/openclaw:/home/node/.openclaw
      - ./openclaw-workspace:/home/node/.openclaw/workspace
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: kali-dashboard:latest
    container_name: kali-dashboard
    env_file: .env
    environment:
      - OPENCLAW_DASHBOARD_URL=http://127.0.0.1:18789
    # Agent runs execute here — they need the same network capabilities as kali
    # (raw sockets for nmap/masscan, net_admin for packet tooling).
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./dashboard:/dashboard
      - ./work:/work
      - ./scripts:/scripts:ro
      - ./tools:/tools:ro
      - ./config/tools.json:/config/tools.json:ro
      - ./config/benchmarks:/config/benchmarks:ro
      - ./config/authorized-targets.json:/config/authorized-targets.json
      - ./config/hermes/config.yaml:/home/pentest/.hermes/config.yaml:ro
      - ./config/hermes/SOUL.md:/home/pentest/.hermes/SOUL.md:ro
      - ./config/agents:/agents:ro
    depends_on:
      - kali
      - openclaw

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: kali-zap
    hostname: zap
    env_file: .env
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8090
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config connection.timeoutInSecs=300
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./work/zap:/zap/wrk
      - ./work:/work
    depends_on:
      - kali

  vpn:
    image: dperson/openvpn-client:latest
    container_name: kali-vpn
    hostname: vpn
    env_file: .env
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - ./vpn:/vpn:ro
    command: >
      sh -c "if [ -f /vpn/active.ovpn ]; then
        openvpn --config /vpn/active.ovpn --daemon --log /vpn/openvpn.log;
      else
        echo 'No active VPN profile. Place .ovpn in ./vpn/ and name it active.ovpn';
        tail -f /dev/null;
      fi"
    depends_on:
      - kali

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kali-qdrant
    hostname: qdrant
    env_file: .env
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./work/qdrant:/qdrant/storage
    depends_on:
      - kali

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: kali-dvwa
    hostname: dvwa
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - kali

  metasploitable2:
    image: tleemcjr/metasploitable2:latest
    container_name: kali-metasploitable2
    hostname: metasploitable2
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - kali
